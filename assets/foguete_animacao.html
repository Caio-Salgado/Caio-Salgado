<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animação Foguete – Caio Salgado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ── Palco quadrado 600×600 ── */
    .stage {
      position: relative;
      width: 600px;
      height: 600px;
      background: #111;
      overflow: hidden;
    }

    /* ── Texto centralizado no terço superior ── */
    .text-block {
      position: absolute;
      top: 28%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: left;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
    }
    .greeting {
      font-size: 28px;
      font-weight: 300;
      color: #d8d8d8;
      line-height: 1.3;
    }
    .name-line {
      font-size: 40px;
      font-weight: 600;
      color: #ffffff;
      line-height: 1.2;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Mão: parada por padrão; acena via classe .wave ── */
    .hand {
      display: inline-block;
      transform-origin: 70% 80%;
      transform: rotate(0deg);
      transition: none;
    }
    .hand.wave {
      animation: hand-wave 0.9s ease-in-out forwards;
    }
    @keyframes hand-wave {
      0%   { transform: rotate(0deg);  }
      20%  { transform: rotate(18deg); }
      45%  { transform: rotate(-12deg);}
      65%  { transform: rotate(14deg); }
      80%  { transform: rotate(-6deg); }
      100% { transform: rotate(0deg);  }
    }

    /* ── Canvas do rastro ── */
    #trailCanvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    /* ── Foguete ── */
    #rocket {
      position: absolute;
      width: 48px;
      height: 48px;
      pointer-events: none;
      z-index: 5;
      transform-origin: center center;
    }
  </style>
</head>
<body>

<div class="stage" id="stage">

  <!-- canvas onde desenhamos linha + partículas -->
  <canvas id="trailCanvas"></canvas>

  <!-- Texto -->
  <div class="text-block">
    <p class="greeting">Muito prazer,</p>
    <p class="name-line">Caio Salgado <span class="hand" id="hand">👋🏻</span></p>
  </div>

  <!-- Foguete SVG -->
  <svg id="rocket" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Corpo principal -->
    <path d="M16 2 C16 2, 10 8, 10 16 C10 18.5 10.8 20.5 12.2 21.8 L10 26 L13.5 25.2 L15 27 L16 24.5 L17 27 L18.5 25.2 L22 26 L19.8 21.8 C21.2 20.5 22 18.5 22 16 C22 8 16 2 16 2 Z"
          fill="white" />
    <!-- Janela -->
    <circle cx="16" cy="14" r="2.2" fill="#111" />
    <!-- Aletas esquerdas -->
    <path d="M10 18 L7 23 L11.5 21.5 Z" fill="white" opacity="0.85"/>
    <!-- Aletas direitas -->
    <path d="M22 18 L25 23 L20.5 21.5 Z" fill="white" opacity="0.85"/>
    <!-- Chama -->
    <path d="M13.5 26 Q16 29.5 18.5 26" stroke="#ffffff" stroke-width="1.2"
          stroke-linecap="round" fill="none" opacity="0.5"/>
  </svg>

</div>

<script>
/* ================================================================
   CONFIG
================================================================ */
const W = 600, H = 600;

// Duração total da fase de voo (ms)
const FLY_DURATION   = 4400;
// Pausa no começo do loop (ms)
const PAUSE_START    = 300;

/* ================================================================
   CURVA LOGÍSTICA  –  trajectória em 0..1 → {x,y} em pixels
   Foguete entra embaixo à esquerda e sai no canto superior direito
   SEMPRE abaixo da zona de texto (aprox. y < 220 é a área protegida)
================================================================ */
function sigmoid(t) {
  // logística centrada em t=0.5, escala 10: varia de ~0 a ~1
  return 1 / (1 + Math.exp(-10 * (t - 0.5)));
}

function getPoint(t) {
  // x: -60 → 660  (entra e sai fora da tela)
  const x = -60 + t * (W + 120);

  // y usando curva logística invertida:
  //   t=0: y ≈ 550  (canto inferior — começa fora da tela)
  //   t=1: y ≈ 310  (parte superior direita — sempre ABAIXO do texto)
  // Texto ocupa aprox. y=120..220, então yTop=310 garante margem confortável
  const yFull = 550;
  const yTop  = 310;
  const s     = sigmoid(t);
  const y     = yFull - s * (yFull - yTop);

  return { x, y };
}

// Tangente para rotação
function getAngle(t) {
  const dt = 0.005;
  const p1 = getPoint(Math.max(0, t - dt));
  const p2 = getPoint(Math.min(1, t + dt));
  return Math.atan2(p2.y - p1.y, p2.x - p1.x) * (180 / Math.PI);
}

/* ================================================================
   SETUP
================================================================ */
const stage   = document.getElementById('stage');
const canvas  = document.getElementById('trailCanvas');
const ctx     = canvas.getContext('2d');
const rocketEl= document.getElementById('rocket');
const handEl  = document.getElementById('hand');

canvas.width  = W;
canvas.height = H;

/* ================================================================
   TRAIL: lista de segmentos {x,y,age,maxAge} e partículas {x,y,age,maxAge,size}
================================================================ */
let trailPoints  = [];   // { x, y, birth }
let particles    = [];   // { x, y, birth, size, ox, oy }
let lastPoint    = null;

const TRAIL_LIFE = 3200;  // ms que a linha dura
const PART_LIFE  = 3800;  // ms que as partículas duram

function addTrail(x, y, now) {
  trailPoints.push({ x, y, birth: now });

  // Partículas espaçadas aleatoriamente
  if (Math.random() < 0.55) {
    particles.push({
      x: x + (Math.random() - 0.5) * 18,
      y: y + (Math.random() - 0.5) * 18,
      birth: now,
      size: Math.random() * 2.2 + 0.6,
    });
  }
}

function purge(now) {
  trailPoints = trailPoints.filter(p => now - p.birth < TRAIL_LIFE);
  particles   = particles.filter(p => now - p.birth < PART_LIFE);
}

function drawTrail(now) {
  ctx.clearRect(0, 0, W, H);

  // ─ Linha do rastro ─
  if (trailPoints.length > 1) {
    for (let i = 1; i < trailPoints.length; i++) {
      const a = trailPoints[i - 1];
      const b = trailPoints[i];
      const alpha = Math.max(0, 1 - (now - b.birth) / TRAIL_LIFE);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = `rgba(255,255,255,${(alpha * 0.75).toFixed(3)})`;
      ctx.lineWidth   = 1.2;
      ctx.lineCap     = 'round';
      ctx.stroke();
    }
  }

  // ─ Partículas ─
  for (const p of particles) {
    const alpha = Math.max(0, 1 - (now - p.birth) / PART_LIFE);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${(alpha * 0.9).toFixed(3)})`;
    ctx.fill();
  }
}

/* ================================================================
   LOOP DE ANIMAÇÃO
================================================================ */
let phase        = 'flying';   // 'flying' | 'fading' | 'pausing'
let flyStart     = null;
let fadeStart    = null;
let pauseStart   = null;
let waved        = false;

function startLoop(now) {
  phase      = 'flying';
  flyStart   = now;
  waved      = false;
  trailPoints = [];
  particles   = [];
  lastPoint   = null;
  ctx.clearRect(0, 0, W, H);

  // Posição inicial
  const p0 = getPoint(0);
  rocketEl.style.display = 'block';
  rocketEl.style.left    = p0.x + 'px';
  rocketEl.style.top     = p0.y + 'px';
}

function tick(now) {
  requestAnimationFrame(tick);

  if (!flyStart) { flyStart = now; }

  if (phase === 'pausing') {
    if (now - pauseStart >= PAUSE_START) startLoop(now);
    return;
  }

  if (phase === 'fading') {
    purge(now);
    drawTrail(now);
    // Quando não houver mais rastro + partículas, entra em pausa
    if (trailPoints.length === 0 && particles.length === 0) {
      ctx.clearRect(0, 0, W, H);
      phase      = 'pausing';
      pauseStart = now;
    }
    return;
  }

  // ─── phase === 'flying' ────────────────────────────────────────
  const elapsed = now - flyStart;
  const t       = Math.min(1, elapsed / FLY_DURATION);
  const pt      = getPoint(t);
  const angle   = getAngle(t);

  // Move o foguete
  rocketEl.style.left      = (pt.x - 24) + 'px';  // centraliza 48px
  rocketEl.style.top       = (pt.y - 24) + 'px';
  // SVG do foguete aponta para CIMA (nose em y=0), e o movimento é
  // predominantemente para a direita → offset fixo de +90°
  rocketEl.style.transform = `rotate(${angle + 90}deg)`;

  // Rastro: só cria pontos quando o foguete está dentro da tela
  if (pt.x > -30 && pt.x < W + 30) {
    addTrail(pt.x, pt.y, now);
  }

  purge(now);
  drawTrail(now);

  // Foguete saiu pela direita?
  if (t >= 1) {
    rocketEl.style.display = 'none';
    // Aceno da mão
    if (!waved) {
      waved = true;
      handEl.classList.remove('wave');
      void handEl.offsetWidth; // reflow para reiniciar animação
      handEl.classList.add('wave');
      handEl.addEventListener('animationend', () => handEl.classList.remove('wave'), { once: true });
    }
    phase     = 'fading';
    fadeStart = now;
  }
}

// Inicia
requestAnimationFrame(now => {
  flyStart = now;
  requestAnimationFrame(tick);
});
</script>
</body>
</html>
